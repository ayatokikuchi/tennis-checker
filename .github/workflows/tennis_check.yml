name: テニスコート空き状況チェック

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日UTC 0:00 = JST 9:00
    - cron: '0 12 * * *'  # 毎日UTC 12:00 = JST 21:00
  workflow_dispatch:       # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Chrome インストール
        uses: browser-actions/setup-chrome@v1

      - name: 依存ライブラリをインストール
        run: |
          pip install selenium requests beautifulsoup4 jpholiday webdriver-manager

      - name: テニスコート空き確認＆メール送信
        env:
          FROM_EMAIL  : ${{ secrets.FROM_EMAIL }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        run: python tennis_check.py

      - name: 結果JSONをリポジトリにコミット
        run: |
          git config user.name  "github-actions"
          git config user.email "github-actions@github.com"
          git add tennis_results.json
          git diff --staged --quiet || git commit -m "Update tennis results"
          git push
